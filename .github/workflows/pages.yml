name: Publicar Caltrack

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v7
      - name: Configurar Pages
        uses: actions/configure-pages@v6
      - name: Preparar web estática
        uses: actions/upload-pages-artifact@v5
        with:
          path: caltrack/static
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v5
